<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegas Vigilância | Vega IA</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-dim: rgba(0, 242, 255, 0.6);
            --silver: #c0c0c0;
            --bright: #e8e8e8;
            --deep-black: #050505;
            --slate: #0d0d0f;
            --glass-bg: rgba(15, 17, 22, 0.78);
            --user-bubble: rgba(0, 242, 255, 0.12);
            --bot-bubble: rgba(255, 255, 255, 0.045);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--deep-black);
            color: var(--silver);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 30%, rgba(0, 242, 255, 0.07) 0%, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px) 0 0 / 50px 50px;
            z-index: -1;
        }

        /* ============ SPLASH SCREEN ============ */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--deep-black);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            transition: opacity .6s ease, visibility .6s ease;
        }

        #splash.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #splash img {
            width: 200px;
            max-width: 60%;
            filter: drop-shadow(0 0 18px rgba(0, 242, 255, .35));
            animation: floatLogo 2.6s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .splash-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, var(--neon-blue), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 2.4s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: -200% center; }
        }

        .splash-bar {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .splash-bar::after {
            content: "";
            display: block;
            height: 100%;
            width: 40%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            border-radius: 3px;
            animation: loadBar 1.4s ease-in-out infinite;
        }

        @keyframes loadBar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .splash-sub {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--neon-dim);
            text-transform: uppercase;
        }

        /* ============ CONTAINER ============ */
        .container {
            background: var(--glass-bg);
            border: 1px solid rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            height: min(90vh, 780px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(0, 242, 255, 0.03);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(.97);
            animation: containerIn .6s ease forwards .15s;
        }

        @keyframes containerIn {
            to { opacity: 1; transform: scale(1); }
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, transparent 30%, rgba(0, 242, 255, 0.25), transparent 70%);
            z-index: -1;
            border-radius: 18px;
        }

        header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.12);
            text-align: center;
            flex-shrink: 0;
        }

        .logo-vegas {
            width: 220px;
            max-width: 85%;
            height: auto;
            display: block;
            margin: 0 auto 12px;
            filter:
                drop-shadow(0 0 10px rgba(255, 255, 255, .15)) drop-shadow(0 0 25px rgba(0, 242, 255, .25));
            transition: .35s;
        }

        .logo-vegas:hover {
            transform: scale(1.03);
            filter:
                drop-shadow(0 0 15px rgba(255, 255, 255, .3)) drop-shadow(0 0 35px rgba(0, 242, 255, .45));
        }

        .ai-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 18px rgba(0, 242, 255, .35);
        }

        header h1 {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: var(--silver);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--neon-blue);
            box-shadow: 0 0 8px var(--neon-blue);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .sub {
            font-size: 0.68rem;
            letter-spacing: 2px;
            color: var(--neon-dim);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .speaking-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            margin-left: 6px;
        }

        .speaking-indicator.active {
            display: inline-flex;
        }

        .speaking-indicator span {
            width: 3px;
            height: 10px;
            background: var(--neon-blue);
            border-radius: 2px;
            animation: soundwave 0.9s ease-in-out infinite;
        }

        .speaking-indicator span:nth-child(2) { animation-delay: .15s; }
        .speaking-indicator span:nth-child(3) { animation-delay: .3s; }

        @keyframes soundwave {
            0%, 100% { height: 4px; }
            50% { height: 14px; }
        }

        /* Chat */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-dim) transparent;
        }

        .chat::-webkit-scrollbar {
            width: 5px;
        }

        .chat::-webkit-scrollbar-thumb {
            background: var(--neon-dim);
            border-radius: 3px;
        }

        .msg-row {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: fadeIn 0.35s ease;
        }

        .msg-row.user { align-self: flex-end; align-items: flex-end; }
        .msg-row.bot { align-self: flex-start; align-items: flex-start; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 1rem;
            line-height: 1.45;
            word-wrap: break-word;
        }

        .msg.bot {
            background: var(--bot-bubble);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-left: 2px solid var(--neon-blue);
            color: var(--bright);
            border-bottom-left-radius: 4px;
        }

        .msg.user {
            background: var(--user-bubble);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 0.62rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            margin-top: 4px;
            padding: 0 4px;
        }

        .msg.typing-dots {
            color: var(--neon-dim);
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .typing-dots .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-dim);
            animation: blink 1.2s infinite;
        }

        .typing-dots .dot:nth-child(2) { animation-delay: .2s; }
        .typing-dots .dot:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {

            0%, 80%, 100% {
                opacity: 0.25;
                transform: scale(0.85);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cursor-blink::after {
            content: "▍";
            color: var(--neon-blue);
            animation: blink 1s steps(1) infinite;
        }

        /* Seletor de humor inicial */
        .mood-row {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 8px 0 4px;
        }

        .mood-btn {
            background: none;
            border: none;
            cursor: pointer;
            filter: grayscale(100%);
            opacity: 0.55;
            transition: 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mood-btn i {
            font-size: 2.6rem;
            color: var(--silver);
        }

        .mood-btn:hover,
        .mood-btn.active {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.18);
        }

        .mood-btn.angry.active i,
        .mood-btn.angry:hover i {
            color: #ff4d4d;
            text-shadow: 0 0 14px #ff4d4d;
        }

        .mood-btn.neutral.active i,
        .mood-btn.neutral:hover i {
            color: #ffd900;
            text-shadow: 0 0 14px #ffd900;
        }

        .mood-btn.happy.active i,
        .mood-btn.happy:hover i {
            color: #2ecc71;
            text-shadow: 0 0 14px #2ecc71;
        }

        /* Input area */
        .input-bar {
            padding: 14px 18px 14px;
            border-top: 1px solid rgba(0, 242, 255, 0.12);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            min-height: 48px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            resize: none;
            outline: none;
            max-height: 110px;
            transition: 0.2s;
        }

        textarea:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.12);
        }

        textarea::placeholder {
            white-space: nowrap;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1px solid var(--neon-blue);
            background: transparent;
            color: var(--neon-blue);
            cursor: pointer;
            font-size: 1.15rem;
            transition: 0.2s;
            display: grid;
            place-items: center;
        }

        .icon-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 16px var(--neon-blue);
        }

        .icon-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .mic-btn.recording {
            background: #ff4d4d;
            border-color: #ff4d4d;
            color: #fff;
            box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.6);
            animation: ring 1.3s infinite;
        }

        @keyframes ring {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.6)
            }

            70% {
                box-shadow: 0 0 0 14px rgba(255, 77, 77, 0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0)
            }
        }

        .footer-tag {
            text-align: center;
            font-size: 0.62rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 1.5px;
            padding-bottom: 6px;
        }

        .credit-link {
            text-align: center;
            padding-bottom: 12px;
        }

        .credit-link a {
            font-size: 0.62rem;
            letter-spacing: 1px;
            color: rgba(0, 242, 255, 0.45);
            text-decoration: none;
            transition: .2s;
        }

        .credit-link a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .voice-toggle {
            background: none;
            border: none;
            color: var(--neon-dim);
            cursor: pointer;
            font-size: 1.15rem;
            align-self: center;
        }

        .voice-toggle.muted {
            color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .container { height: 95vh; border-radius: 12px; }
            .logo-vegas { width: 170px; }
            .ai-name { font-size: 1.1rem; letter-spacing: 3px; }
            .msg-row { max-width: 90%; }
        }
    </style>
</head>

<body>

    <div id="splash">
        <img src="assets/logo.png" alt="Vegas Vigilância">
        <div class="splash-title">VEGA IA</div>
        <div class="splash-bar"></div>
        <div class="splash-sub">Inicializando canal seguro...</div>
    </div>

    <div class="container">
        <header>
            <img src="assets/logo.png" alt="Vegas Vigilância" class="logo-vegas">
            <div class="ai-name">VEGA IA</div>
            <h1>Assistente Inteligente de Escuta</h1>
            <div class="sub">
                <span class="status-dot"></span>CANAL SEGURO • 100% ANÔNIMO
                <span class="speaking-indicator" id="speakingIndicator"><span></span><span></span><span></span></span>
            </div>
        </header>

        <div class="chat" id="chat"></div>

        <div class="input-bar">
            <button class="voice-toggle" id="voiceToggle" title="Ativar/desativar voz"><i
                    class="fas fa-volume-up"></i></button>
            <textarea id="input" rows="1" placeholder="Escreva ou fale..." disabled></textarea>
            <button class="icon-btn mic-btn" id="micBtn" title="Gravar áudio" disabled><i
                    class="fas fa-microphone"></i></button>
            <button class="icon-btn send-btn" id="sendBtn" title="Enviar" disabled><i
                    class="fas fa-paper-plane"></i></button>
        </div>
        <div class="footer-tag">SISTEMA ENCRIPTADO • SEM IDENTIFICAÇÃO PESSOAL</div>
        <div class="credit-link">
            <a href="https://github.com/vegasvig" target="_blank" rel="noopener">Desenvolvido por André Cruz</a>
        </div>
    </div>

    <script>
        // ============ CONFIG ============
        const N8N_WEBHOOK_URL = 'https://ajuda.app.n8n.cloud/webhook/technical-support';

        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const voiceToggle = document.getElementById('voiceToggle');
        const speakingIndicator = document.getElementById('speakingIndicator');
        const splash = document.getElementById('splash');

        const sessionId = 'anon-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
        let history = [];
        let mood = null;
        let voiceEnabled = true;
        let recognizing = false;

        // ============ SPLASH SCREEN ============
        window.addEventListener('load', () => {
            setTimeout(() => {
                splash.classList.add('hide');
                setTimeout(startConversation, 500);
            }, 1800);
        });

        function startConversation() {
            const greet = 'Olá! Sou a Vega IA, assistente de escuta da Vegas Vigilância. Este canal é totalmente anônimo. Estou aqui para ouvir suas opiniões, sugestões e dificuldades. Como você está se sentindo hoje?';
            addMsg('bot', greet);
            speak(greet);
            showMoodRow();
        }

        // ============ Voz: síntese (TTS) ============
        let ptVoice = null;

        function loadVoice() {
            const voices = speechSynthesis.getVoices();
            ptVoice =
                voices.find(v => v.name.includes('Francisca')) ||
                voices.find(v => v.name.includes('Google português')) ||
                voices.find(v => v.name.includes('Maria')) ||
                voices.find(v => v.lang === 'pt-BR') ||
                voices.find(v => v.lang.startsWith('pt')) ||
                voices[0];
        }

        speechSynthesis.onvoiceschanged = loadVoice;
        loadVoice();

        function speak(text) {
            if (!voiceEnabled) return;
            speechSynthesis.cancel();

            const fala = new SpeechSynthesisUtterance(text);
            fala.voice = ptVoice;
            fala.lang = 'pt-BR';
            fala.rate = 0.97;
            fala.pitch = 1.02;
            fala.volume = 1;

            fala.onstart = () => speakingIndicator.classList.add('active');
            fala.onend = () => speakingIndicator.classList.remove('active');
            fala.onerror = () => speakingIndicator.classList.remove('active');

            speechSynthesis.speak(fala);
        }

        voiceToggle.onclick = () => {
            voiceEnabled = !voiceEnabled;
            voiceToggle.classList.toggle('muted', !voiceEnabled);
            voiceToggle.innerHTML = voiceEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
            if (!voiceEnabled) {
                speechSynthesis.cancel();
                speakingIndicator.classList.remove('active');
            }
        };

        // ============ Voz: reconhecimento (STT) ============
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SR) {
            recognition = new SR();
            recognition.lang = 'pt-BR';
            recognition.interimResults = true;
            recognition.continuous = false;

            recognition.onresult = (e) => {
                let txt = '';
                for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
                input.value = txt;
            };
            recognition.onend = () => {
                recognizing = false;
                micBtn.classList.remove('recording');
                if (input.value.trim()) send();
            };
            recognition.onerror = () => { recognizing = false; micBtn.classList.remove('recording'); };
        } else {
            micBtn.title = 'Seu navegador não suporta voz — use o texto';
        }

        micBtn.onclick = () => {
            if (!recognition) { addMsg('bot', 'Seu navegador não suporta gravação de voz. Pode escrever normalmente.'); return; }
            if (recognizing) { recognition.stop(); return; }
            // A IA para de falar quando o usuário começa a falar
            speechSynthesis.cancel();
            speakingIndicator.classList.remove('active');
            recognizing = true;
            micBtn.classList.add('recording');
            recognition.start();
        };

        // Também interrompe a fala da IA ao começar a digitar
        input.addEventListener('keydown', () => {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
                speakingIndicator.classList.remove('active');
            }
        });

        // ============ UI helpers ============
        function formatTime() {
            const d = new Date();
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function addMsg(role, text) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');

            const bubble = document.createElement('div');
            bubble.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
            bubble.textContent = text;

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = formatTime();

            row.appendChild(bubble);
            row.appendChild(time);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
            return row;
        }

        // Efeito de digitação para respostas da IA
        function addTypedMsg(text) {
            const row = document.createElement('div');
            row.className = 'msg-row bot';

            const bubble = document.createElement('div');
            bubble.className = 'msg bot cursor-blink';
            bubble.textContent = '';

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = formatTime();

            row.appendChild(bubble);
            row.appendChild(time);
            chat.appendChild(row);

            let i = 0;
            const speed = Math.max(8, Math.min(22, 900 / text.length));
            const interval = setInterval(() => {
                bubble.textContent = text.slice(0, i + 1);
                chat.scrollTop = chat.scrollHeight;
                i++;
                if (i >= text.length) {
                    clearInterval(interval);
                    bubble.classList.remove('cursor-blink');
                }
            }, speed);
        }

        function showTyping() {
            const row = document.createElement('div');
            row.className = 'msg-row bot';
            const bubble = document.createElement('div');
            bubble.className = 'msg bot typing-dots';
            bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
            row.appendChild(bubble);
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
            return row;
        }

        // ============ Humor inicial ============
        function showMoodRow() {
            const row = document.createElement('div');
            row.className = 'mood-row';
            row.id = 'moodRow';
            row.innerHTML = `
                <button class="mood-btn angry" data-mood="Insatisfeito" title="Insatisfeito"><i class="fas fa-frown"></i></button>
                <button class="mood-btn neutral" data-mood="Regular" title="Regular"><i class="fas fa-meh"></i></button>
                <button class="mood-btn happy" data-mood="Satisfeito" title="Satisfeito"><i class="fas fa-smile-beam"></i></button>
            `;
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;

            row.querySelectorAll('.mood-btn').forEach(b => {
                b.onclick = () => {
                    row.querySelectorAll('.mood-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    mood = b.dataset.mood;
                    input.disabled = false; sendBtn.disabled = false; micBtn.disabled = false;
                    input.focus();
                    const greet = `Entendi, você está se sentindo ${mood.toLowerCase()}. Pode me contar o que aconteceu ou o que gostaria de sugerir?`;
                    addMsg('bot', greet);
                    speak(greet);
                };
            });
        }

        // ============ Envio ============
        async function send() {
            const text = input.value.trim();
            if (!text) return;
            addMsg('user', text);
            history.push({ role: 'user', content: text });
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true; micBtn.disabled = true;

            const typing = showTyping();
            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, mood, message: text, history })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const reply = (await res.text()).trim() || 'Recebi sua mensagem. Obrigado pelo retorno.';
                typing.remove();
                addTypedMsg(reply);
                history.push({ role: 'assistant', content: reply });
                speak(reply.replace(/<[^>]+>/g, ''));
            } catch (err) {
                typing.remove();
                addMsg('bot', 'Falha na conexão com a central. Sua mensagem não foi registrada — tente novamente.');
                console.error(err);
            } finally {
                sendBtn.disabled = false; micBtn.disabled = false;
            }
        }

        sendBtn.onclick = send;
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 110) + 'px';
        });
    </script>
</body>

</html>
